name: Weekly Deploy & Report

on:
  schedule:
    - cron: "0 6 * * 1"  # Lunes 6:00 UTC (8:00 España en verano)
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

  report:
    name: Weekly Report → Slack
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install anthropic supabase requests
      - name: Generate weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/weekly_report.py
